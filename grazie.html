<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatura inviata — ARTEDILE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #04091a;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 15% 20%, rgba(26,75,140,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 70% 80% at 85% 75%, rgba(37,99,176,0.28) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(74,144,217,0.08) 0%, transparent 70%);
    animation: bgPulse 9s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(168,200,240,0.15);
    border-radius: 28px;
    padding: 3.5rem 3rem 3rem;
    max-width: 500px;
    width: calc(100% - 2rem);
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 50px 100px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    animation: cardIn 1.1s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(70px) scale(0.88); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(168,200,240,0.85);
    margin-bottom: 2.2rem;
    animation: fadeIn 1s 0.4s both;
  }

  /* ─── 3D CUBE ─── */
  .cube-scene {
    perspective: 320px;
    width: 76px;
    height: 76px;
    margin: 0 auto 2.5rem;
    animation: fadeIn 0.8s 0.3s both;
  }
  .cube {
    width: 76px;
    height: 76px;
    position: relative;
    transform-style: preserve-3d;
    animation: spinCube 9s linear infinite;
  }
  @keyframes spinCube {
    0%   { transform: rotateX(15deg) rotateY(0deg); }
    100% { transform: rotateX(15deg) rotateY(360deg); }
  }
  .face {
    position: absolute;
    width: 76px; height: 76px;
    border: 1px solid rgba(74,144,217,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
  }
  .face.front  { background: rgba(26,75,140,0.30);  transform: translateZ(38px); }
  .face.back   { background: rgba(37,99,176,0.22);   transform: rotateY(180deg) translateZ(38px); }
  .face.right  { background: rgba(74,144,217,0.18);  transform: rotateY(90deg)  translateZ(38px); }
  .face.left   { background: rgba(26,75,140,0.18);   transform: rotateY(-90deg) translateZ(38px); }
  .face.top    { background: rgba(168,200,240,0.10); transform: rotateX(90deg)  translateZ(38px); }
  .face.bottom { background: rgba(4,9,26,0.40);      transform: rotateX(-90deg) translateZ(38px); }

  /* ─── ANIMATED CHECKMARK ─── */
  .check-wrap {
    width: 88px;
    height: 88px;
    margin: 0 auto 2rem;
    position: relative;
  }
  .glow-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,144,217,0.18) 0%, transparent 70%);
    animation: glowPulse 2.5s 2s ease-in-out infinite alternate;
  }
  @keyframes glowPulse {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.08); }
  }
  .check-circle-bg {
    fill: none;
    stroke: rgba(74,144,217,0.15);
    stroke-width: 2;
  }
  .check-circle-draw {
    fill: none;
    stroke: #4A90D9;
    stroke-width: 2.5;
    stroke-dasharray: 264;
    stroke-dashoffset: 264;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    animation: drawCircle 1.1s 0.7s cubic-bezier(0.65,0,0.45,1) forwards;
  }
  .check-tick {
    fill: none;
    stroke: #C8DEFF;
    stroke-width: 3.5;
    stroke-dasharray: 56;
    stroke-dashoffset: 56;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: drawTick 0.5s 1.7s ease forwards;
  }
  @keyframes drawCircle { to { stroke-dashoffset: 0; } }
  @keyframes drawTick   { to { stroke-dashoffset: 0; } }

  /* ─── TEXT ─── */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    font-style: italic;
    color: #fff;
    line-height: 1.0;
    margin-bottom: 0.3rem;
    animation: fadeUp 0.9s 1.8s both;
  }
  h1 strong {
    font-style: normal;
    font-weight: 700;
    color: #A8C8F0;
  }
  .sub {
    color: rgba(168,200,240,0.65);
    font-size: 0.92rem;
    line-height: 1.75;
    margin-top: 0.6rem;
    animation: fadeUp 0.9s 2s both;
  }

  .deco {
    width: 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,144,217,0.6), transparent);
    margin: 1.3rem auto;
    animation: fadeIn 1s 2.1s both;
  }

  /* ─── COUNTDOWN RING ─── */
  .cdown-wrap {
    position: relative;
    width: 68px; height: 68px;
    margin: 2rem auto 0;
    animation: fadeUp 0.9s 2.2s both;
  }
  .ring-bg   { fill: none; stroke: rgba(74,144,217,0.12); stroke-width: 3; }
  .ring-fill {
    fill: none;
    stroke: #4A90D9;
    stroke-width: 3;
    stroke-dasharray: 182;
    stroke-dashoffset: 0;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    animation: ringDrain 5s linear 2.4s forwards;
  }
  @keyframes ringDrain { to { stroke-dashoffset: 182; } }
  .ring-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #A8C8F0;
  }

  a.btn {
    display: inline-block;
    margin-top: 1.6rem;
    padding: 0.8rem 2.4rem;
    background: rgba(74,144,217,0.15);
    border: 1px solid rgba(74,144,217,0.35);
    color: #A8C8F0;
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.3s;
    animation: fadeUp 0.9s 2.2s both;
  }
  a.btn:hover {
    background: rgba(74,144,217,0.3);
    border-color: rgba(168,200,240,0.55);
    color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 10px 35px rgba(74,144,217,0.3);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="bg"></div>
<canvas id="c"></canvas>

<div class="card">

  <div class="logo">ARTEDILE</div>

  <div class="cube-scene">
    <div class="cube">
      <div class="face front">🏗️</div>
      <div class="face back">⚡</div>
      <div class="face right">🔨</div>
      <div class="face left">🏛️</div>
      <div class="face top">✦</div>
      <div class="face bottom">✦</div>
    </div>
  </div>

  <div class="check-wrap">
    <div class="glow-ring"></div>
    <svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <circle class="check-circle-bg" cx="44" cy="44" r="42"/>
      <circle class="check-circle-draw" cx="44" cy="44" r="42"/>
      <polyline class="check-tick" points="26,45 39,58 62,30"/>
    </svg>
  </div>

  <h1>Candidatura<br><strong>Inviata!</strong></h1>
  <div class="deco"></div>
  <p class="sub">Grazie per il tuo interesse a far parte del team.<br>Ti contatteremo al più presto.</p>

  <div class="cdown-wrap">
    <svg viewBox="0 0 68 68">
      <circle class="ring-bg"   cx="34" cy="34" r="29"/>
      <circle class="ring-fill" cx="34" cy="34" r="29"/>
    </svg>
    <div class="ring-num" id="sec">5</div>
  </div>

  <a class="btn" href="https://artedileimpresa.it/#lavora">← Torna al sito</a>

</div>

<script>
/* ─── PARTICLE CANVAS ─── */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

class P {
  constructor(rand) {
    this.reset(rand ?? true);
  }
  reset(rand) {
    this.x = Math.random() * W;
    this.y = rand ? Math.random() * H : H + 8;
    this.r = Math.random() * 1.4 + 0.3;
    this.vy = Math.random() * 0.45 + 0.12;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.a  = Math.random() * 0.55 + 0.15;
    this.ph = Math.random() * Math.PI * 2;
    this.col = Math.random() > 0.5 ? '168,200,240' : '74,144,217';
  }
  tick() {
    this.y -= this.vy;
    this.x += this.vx;
    this.ph += 0.018;
    if (this.y < -10) this.reset(false);
  }
  draw() {
    const a = this.a * (0.65 + 0.35 * Math.sin(this.ph));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.col},${a.toFixed(2)})`;
    ctx.fill();
  }
}

const parts = Array.from({ length: 140 }, () => new P());

function draw() {
  ctx.clearRect(0, 0, W, H);
  parts.forEach(p => { p.tick(); p.draw(); });
  requestAnimationFrame(draw);
}
draw();

/* ─── COUNTDOWN ─── */
let s = 5;
const el = document.getElementById('sec');
setTimeout(() => {
  const t = setInterval(() => {
    s--;
    el.textContent = s;
    if (s <= 0) {
      clearInterval(t);
      window.location.href = 'https://artedileimpresa.it/#lavora';
    }
  }, 1000);
}, 2400);
</script>
</body>
</html>
