<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatura inviata — ARTEDILE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1A4B8C;
    --blue-mid: #2563B0;
    --sky-pale: #D6E8F9;
    --white: #FFFFFF;
    --dark: #1A2332;
    --grey-dark: #5A6A7A;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--sky-pale);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(26,75,140,0.12);
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .icon {
    width: 72px;
    height: 72px;
    background: #e8f5e9;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .icon svg {
    width: 36px;
    height: 36px;
    stroke: #2e7d32;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    color: var(--dark);
    margin-bottom: 0.75rem;
  }
  p {
    color: var(--grey-dark);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 0.5rem;
  }
  .counter {
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--blue-mid);
  }
  .bar-wrap {
    height: 4px;
    background: var(--sky-pale);
    border-radius: 2px;
    margin-top: 0.75rem;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    width: 100%;
    transform-origin: left;
    animation: shrink 5s linear forwards;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  a.btn {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.7rem 1.8rem;
    background: var(--blue);
    color: var(--white);
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ARTEDILE</div>
  <div class="icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Candidatura inviata!</h1>
  <p>Grazie per aver inviato il tuo CV.<br>Ti contatteremo il prima possibile.</p>
  <div class="counter">Verrai reindirizzato tra <span id="sec">5</span> secondi…</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <a class="btn" href="https://artedileimpresa.it/#lavora">Torna al sito</a>
</div>
<script>
  let s = 5;
  const el = document.getElementById('sec');
  const t = setInterval(() => {
    s--;
    el.textContent = s;
    if (s <= 0) { clearInterval(t); window.location.href = 'https://artedileimpresa.it/#lavora'; }
  }, 1000);
</script>
</body>
</html>
